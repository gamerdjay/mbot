<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrôleur mBot Web</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --primary: #007aff;
            --success: #34c759;
            --danger: #ff3b30;
            --text: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .status {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 25px;
            word-wrap: break-word;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
        }

        .status.connected {
            color: var(--success);
            font-weight: bold;
            background: rgba(52, 199, 89, 0.1);
        }

        .status.error {
            color: var(--danger);
            background: rgba(255, 59, 48, 0.1);
        }

        button {
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-connect {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            margin-bottom: 30px;
        }

        .btn-disconnect {
            background-color: var(--danger);
        }

        .joystick-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 15px;
            margin-bottom: 30px;
        }

        .btn-pad {
            background-color: #2c2c32;
            color: white;
            padding: 20px;
            font-size: 24px;
            border-radius: 15px;
            user-select: none;
        }

        .btn-pad:active {
            background-color: var(--primary);
        }

        .led-controls {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }

        .btn-led {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .led-red { background-color: #ff453a; }
        .led-green { background-color: #32d74b; }
        .led-blue { background-color: #0a84ff; }
        .led-off { background-color: #48484a; }

        .disabled {
            opacity: 0.2;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>mBot Controller</h1>
    <div id="statusLabel" class="status">Déconnecté</div>

    <button id="connectBtn" class="btn-connect">Se connecter au mBot</button>

    <div id="controlsZone" class="disabled">
        <div class="joystick-grid">
            <div></div>
            <button class="btn-pad" onmousedown="envoyerDirection('AVANT')" onmouseup="stopMoteurs()" ontouchstart="envoyerDirection('AVANT')" ontouchend="stopMoteurs()">▲</button>
            <div></div>
            
            <button class="btn-pad" onmousedown="envoyerDirection('GAUCHE')" onmouseup="stopMoteurs()" ontouchstart="envoyerDirection('GAUCHE')" ontouchend="stopMoteurs()">◀</button>
            <button class="btn-pad" style="background-color: var(--danger);" onclick="stopMoteurs()">⏹</button>
            <button class="btn-pad" onmousedown="envoyerDirection('DROITE')" onmouseup="stopMoteurs()" ontouchstart="envoyerDirection('DROITE')" ontouchend="stopMoteurs()">▶</button>
            
            <div></div>
            <button class="btn-pad" onmousedown="envoyerDirection('ARRIERE')" onmouseup="stopMoteurs()" ontouchstart="envoyerDirection('ARRIERE')" ontouchend="stopMoteurs()">▼</button>
            <div></div>
        </div>

        <hr style="border: 0; border-top: 1px solid #2c2c32; margin: 25px 0;">

        <h3>Couleur des LED</h3>
        <div class="led-controls">
            <button class="btn-led led-red" onclick="changerLED(255, 0, 0)"></button>
            <button class="btn-led led-green" onclick="changerLED(0, 255, 0)"></button>
            <button class="btn-led led-blue" onclick="changerLED(0, 0, 255)"></button>
            <button class="btn-led led-off" onclick="changerLED(0, 0, 0)"></button>
        </div>
    </div>
</div>

<script>
    let mbotDevice = null;
    let txCharacteristic = null;

    const connectBtn = document.getElementById('connectBtn');
    const statusLabel = document.getElementById('statusLabel');
    const controlsZone = document.getElementById('controlsZone');

    connectBtn.addEventListener('click', async () => {
        if (!mbotDevice) {
            await connecterMBot();
        } else {
            deconnecterMBot();
        }
    });

    async function connecterMBot() {
        statusLabel.classList.remove('error', 'connected');
        try {
            statusLabel.textContent = "Recherche du mBot...";
            
            // Acceptation totale pour forcer l'ouverture du flux
            mbotDevice = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [
                    '0000ffe0-0000-1000-8000-00805f9b34fb',
                    '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
                ]
            });

            statusLabel.textContent = "Connexion au robot...";
            const server = await mbotDevice.gatt.connect();
            
            statusLabel.textContent = "Scan forcé du flux...";
            let serviceTrouve = null;
            let charTrouvee = null;

            // Tentative standard 1 (Classique)
            try {
                serviceTrouve = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                charTrouvee = await serviceTrouve.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
            } catch (e) {
                // Tentative standard 2 (Nordic)
                try {
                    serviceTrouve = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
                    charTrouvee = await serviceTrouve.getCharacteristic('6e400003-b5a3-f393-e0a9-e50e24dcca9e');
                } catch (err2) {
                    // MODE SECOURS ULTRA-AGRESSIF : On prend le premier service et la première caractéristique qui existent
                    console.log("Recherche alternative désespérée...");
                    const allServices = await server.getPrimaryServices();
                    if(allServices.length > 0) {
                        for(let s of allServices) {
                            const chars = await s.getCharacteristics();
                            for(let c of chars) {
                                if(c.properties.write || c.properties.writeWithoutResponse) {
                                    charTrouvee = c;
                                    break;
                                }
                            }
                            if(charTrouvee) break;
                        }
                    }
                }
            }

            if (!charTrouvee) {
                throw new Error("Aucun canal d'écriture disponible détecté.");
            }

            txCharacteristic = charTrouvee;
            console.log("Connecté avec succès sur la caractéristique :", txCharacteristic.uuid);

            statusLabel.textContent = "Connecté au mBot !";
            statusLabel.classList.add('connected');
            connectBtn.textContent = "Se déconnecter";
            connectBtn.classList.add('btn-disconnect');
            controlsZone.classList.remove('disabled');

            mbotDevice.addEventListener('gattserverdisconnected', deconnecterMBot);

        } catch (error) {
            console.error(error);
            statusLabel.textContent = "Erreur : " + error.message;
            statusLabel.classList.add('error');
            mbotDevice = null;
        }
    }

    function deconnecterMBot() {
        if (mbotDevice && mbotDevice.gatt.connected) {
            mbotDevice.gatt.disconnect();
        }
        mbotDevice = null;
        txCharacteristic = null;

        statusLabel.textContent = "Déconnecté";
        statusLabel.classList.remove('connected', 'error');
        connectBtn.textContent = "Se connecter au mBot";
        connectBtn.classList.remove('btn-disconnect');
        controlsZone.classList.add('disabled');
    }

    async function envoyerCommande(buffer) {
        if (!txCharacteristic) return;
        try {
            await txCharacteristic.writeValue(new Uint8Array(buffer));
        } catch (err) {
            console.error("Erreur d'envoi :", err);
        }
    }

    function piloterMoteurs(vitesseGauche, vitesseDroite) {
        const vg = new Int16Array([vitesseGauche])[0];
        const vd = new Int16Array([vitesseDroite])[0];

        const cmd = [
            0xff, 0x55, 0x09, 0x00, 0x02, 0x05,
            (vg & 0xff), ((vg >> 8) & 0xff),
            (vd & 0xff), ((vd >> 8) & 0xff)
        ];
        envoyerCommande(cmd);
    }

    function envoyerDirection(direction) {
        const vitesse = 150;
        switch(direction) {
            case 'AVANT':   piloterMoteurs(vitesse, vitesse); break;
            case 'ARRIERE': piloterMoteurs(-vitesse, -vitesse); break;
            case 'GAUCHE':  piloterMoteurs(-vitesse, vitesse); break;
            case 'DROITE':  piloterMoteurs(vitesse, -vitesse); break;
        }
    }

    function stopMoteurs() {
        piloterMoteurs(0, 0);
    }

    function changerLED(r, g, b) {
        const cmd = [0xff, 0x55, 0x09, 0x00, 0x02, 0x08, 0x00, 0x00, r, g, b];
        envoyerCommande(cmd);
    }
</script>
</body>
</html>
