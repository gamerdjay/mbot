<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrôleur mBot Web</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --primary: #007aff;
            --success: #34c759;
            --danger: #ff3b30;
            --text: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .status {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 25px;
        }

        .status.connected {
            color: var(--success);
            font-weight: bold;
        }

        button {
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-connect {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            margin-bottom: 30px;
        }

        .btn-disconnect {
            background-color: var(--danger);
        }

        /* Grille du Joystick / Flèches */
        .joystick-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 15px;
            margin-bottom: 30px;
        }

        .btn-pad {
            background-color: #2c2c32;
            color: white;
            padding: 20px;
            font-size: 24px;
            border-radius: 15px;
        }

        .btn-pad:active {
            background-color: var(--primary);
        }

        /* Section Contrôle des LED */
        .led-controls {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }

        .btn-led {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .led-red { background-color: #ff453a; }
        .led-green { background-color: #32d74b; }
        .led-blue { background-color: #0a84ff; }
        .led-off { background-color: #48484a; }

        .disabled {
            opacity: 0.3;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>mBot Controller</h1>
    <div id="statusLabel" class="status">Déconnecté</div>

    <button id="connectBtn" class="btn-connect">Se connecter au mBot</button>

    <div id="controlsZone" class="disabled">
        
        <div class="joystick-grid">
            <div></div>
            <button class="btn-pad" onmousedown="envoyerDirection('AVANT')" onmouseup="stopMoteurs()" ontouchstart="envoyerDirection('AVANT')" ontouchend="stopMoteurs()">▲</button>
            <div></div>
            
            <button class="btn-pad" onmousedown="envoyerDirection('GAUCHE')" onmouseup="stopMoteurs()" ontouchstart="envoyerDirection('GAUCHE')" ontouchend="stopMoteurs()">◀</button>
            <button class="btn-pad" style="background-color: var(--danger);" onclick="stopMoteurs()">⏹</button>
            <button class="btn-pad" onmousedown="envoyerDirection('DROITE')" onmouseup="stopMoteurs()" ontouchstart="envoyerDirection('DROITE')" ontouchend="stopMoteurs()">▶</button>
            
            <div></div>
            <button class="btn-pad" onmousedown="envoyerDirection('ARRIERE')" onmouseup="stopMoteurs()" ontouchstart="envoyerDirection('ARRIERE')" ontouchend="stopMoteurs()">▼</button>
            <div></div>
        </div>

        <hr style="border: 0; border-top: 1px solid #2c2c32; margin: 25px 0;">

        <h3>Couleur des LED</h3>
        <div class="led-controls">
            <button class="btn-led led-red" onclick="changerLED(255, 0, 0)"></button>
            <button class="btn-led led-green" onclick="changerLED(0, 255, 0)"></button>
            <button class="btn-led led-blue" onclick="changerLED(0, 0, 255)"></button>
            <button class="btn-led led-off" onclick="changerLED(0, 0, 0)"></button>
        </div>
    </div>
</div>

<script>
    // Configuration des UUIDs standards pour le module Bluetooth du mBot (Série/UART)
    const UART_SERVICE_UUID = '0000ffe0-0000-1000-8000-00805f9b34fb';
    const UART_TX_CHARACTERISTIC_UUID = '0000ffe1-0000-1000-8000-00805f9b34fb';

    let mbotDevice = null;
    let txCharacteristic = null;

    const connectBtn = document.getElementById('connectBtn');
    const statusLabel = document.getElementById('statusLabel');
    const controlsZone = document.getElementById('controlsZone');

    // Gestion du clic de connexion/déconnexion
    connectBtn.addEventListener('click', async () => {
        if (!mbotDevice) {
            await connecterMBot();
        } else {
            deconnecterMBot();
        }
    });

    async function connecterMBot() {
        try {
            statusLabel.textContent = "Recherche du mBot...";
            
            // Demande d'accès au périphérique Bluetooth Makeblock
            mbotDevice = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'Makeblock' }],
                optionalServices: [UART_SERVICE_UUID]
            });

            statusLabel.textContent = "Connexion...";
            const server = await mbotDevice.gatt.connect();
            const service = await server.getPrimaryService(UART_SERVICE_UUID);
            txCharacteristic = await service.getCharacteristic(UART_TX_CHARACTERISTIC_UUID);

            // Interface utilisateur mise à jour
            statusLabel.textContent = "Connecté au mBot !";
            statusLabel.classList.add('connected');
            connectBtn.textContent = "Se déconnecter";
            connectBtn.classList.add('btn-disconnect');
            controlsZone.classList.remove('disabled');

            // Écouter si l'appareil se déconnecte tout seul
            mbotDevice.addEventListener('gattserverdisconnected', deconnecterMBot);

        } catch (error) {
            console.error(error);
            statusLabel.textContent = "Erreur ou connexion annulée.";
            mbotDevice = null;
        }
    }

    function deconnecterMBot() {
        if (mbotDevice && mbotDevice.gatt.connected) {
            mbotDevice.gatt.disconnect();
        }
        mbotDevice = null;
        txCharacteristic = null;

        statusLabel.textContent = "Déconnecté";
        statusLabel.classList.remove('connected');
        connectBtn.textContent = "Se connecter au mBot";
        connectBtn.classList.remove('btn-disconnect');
        controlsZone.classList.add('disabled');
    }

    // --- PROTOCOLE MAKEBLOCK (Envoi des buffers binaires) ---

    async function envoyerCommande(buffer) {
        if (!txCharacteristic) return;
        try {
            await txCharacteristic.writeValue(new Uint8Array(buffer));
        } catch (err) {
            console.error("Erreur d'envoi :", err);
        }
    }

    // Piloter les moteurs (Vitesse de -255 à 255)
    // Format Makeblock : ff 55 [len] [idx] [action] [device] [port] [vitesse_L] [vitesse_H] ...
    function piloterMoteurs(vitesseGauche, vitesseDroite) {
        // Séparation des entiers en 2 octets (Low byte, High Byte)
        const vg = new Int16Array([vitesseGauche])[0];
        const vd = new Int16Array([vitesseDroite])[0];

        const cmd = [
            0xff, 0x55, // En-tête standard Makeblock
            0x09,       // Longueur du payload restant
            0x00,       // Index du message
            0x02,       // Action : Écrire (Run)
            0x05,       // Device ID : Moteurs DC
            (vg & 0xff), ((vg >> 8) & 0xff), // Moteur Gauche
            (vd & 0xff), ((vd >> 8) & 0xff)  // Moteur Droite
        ];
        envoyerCommande(cmd);
    }

    function envoyerDirection(direction) {
        const vitesse = 150; // Ajuste la vitesse ici (max 255)
        switch(direction) {
            case 'AVANT':   piloterMoteurs(vitesse, vitesse); break;
            case 'ARRIERE': piloterMoteurs(-vitesse, -vitesse); break;
            case 'GAUCHE':  piloterMoteurs(-vitesse, vitesse); break;
            case 'DROITE':  piloterMoteurs(vitesse, -vitesse); break;
        }
    }

    function stopMoteurs() {
        piloterMoteurs(0, 0);
    }

    // Changer la couleur des deux LED embarquées sur la carte
    function changerLED(r, g, b) {
        const cmd = [
            0xff, 0x55, 
            0x09, // Longueur
            0x00, 
            0x02, // Action : Écrire
            0x08, // Device ID : LED RGB onboard
            0x00, // Port (0 pour les LED intégrées)
            0x00, // Index (0 = toutes les LED)
            r, g, b
        ];
        envoyerCommande(cmd);
    }
</script>
</body>
</html>
