<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat 2</title>
    <style>
        :root {
            --snap-yellow: #FFFC00;
            --snap-dark: #0b0b0b;
            --snap-gray: #1e1e1e;
            --snap-light-gray: #2d2d2d;
            --text-color: #ffffff;
            --snap-blue: #0ea5e9;
            --snap-purple: #a855f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #111;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .phone-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 850px;
            background: var(--snap-dark);
            position: relative;
            display: flex;
            flex-direction: column;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            border: 6px solid #222;
            overflow: hidden;
        }

        /* --- AUTHENTIFICATION --- */
        #auth-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--snap-dark);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            gap: 15px;
        }

        .snap-logo { font-size: 60px; margin-bottom: 10px; }
        .auth-input {
            width: 100%;
            padding: 15px;
            background: var(--snap-gray);
            border: 1px solid var(--snap-light-gray);
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        .auth-btn {
            width: 100%;
            padding: 15px;
            background: var(--snap-yellow);
            color: black;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        /* --- ÉCRANS APPLI --- */
        .app-screen {
            flex: 1;
            display: none;
            position: relative;
            height: calc(100% - 70px);
            flex-direction: column;
        }
        .app-screen.active { display: flex; }

        .header {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid var(--snap-light-gray);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--snap-dark);
        }

        /* --- LISTES ET CHAT --- */
        .list-container {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--snap-gray);
            border-radius: 14px;
            cursor: pointer;
        }

        .active-chat-box {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--snap-dark);
            z-index: 50;
            display: none;
            flex-direction: column;
        }
        .messages-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            word-wrap: break-word;
        }
        .msg.sent { background: var(--snap-blue); align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.received { background: var(--snap-gray); align-self: flex-start; border-bottom-left-radius: 2px; }

        .chat-input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            background: var(--snap-gray);
        }

        /* --- SPOTLIGHT --- */
        .spotlight-feed {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        .spotlight-post {
            width: 100%;
            height: 100%;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }
        .spotlight-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .spotlight-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 5;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* --- APPELS EN DIRECT --- */
        .call-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 60;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }
        .video-grid { position: relative; flex: 1; width: 100%; margin-top: 20px;}
        #remote-video { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; background: #222; }
        #local-video { position: absolute; top: 15px; right: 15px; width: 100px; height: 150px; object-fit: cover; border-radius: 12px; border: 2px solid white; transform: scaleX(-1); background: #333; }

        /* --- CAMÉRA --- */
        #screen-camera { background: #000; position: relative; }
        #camera-preview { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .camera-controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 40px;
            z-index: 10;
        }
        .snap-btn { width: 75px; height: 75px; border-radius: 50%; border: 5px solid #fff; background: transparent; cursor: pointer; }
        .spotlight-btn { background: var(--snap-purple); border: none; padding: 10px 15px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; }

        /* --- NAVIGATION --- */
        .bottom-nav {
            height: 70px;
            background: var(--snap-dark);
            border-top: 1px solid var(--snap-light-gray);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav-btn { background: none; border: none; color: #666; font-size: 12px; font-weight: bold; cursor: pointer; }
        .nav-btn.active { color: white; }
        #nav-cam.active { color: var(--snap-yellow); }
        
        .call-actions-btn { padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .btn-hangup { background: #ef4444; color: white; }
        .btn-call { background: #22c55e; color: white; }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <!-- ÉCRAN D'AUTHENTIFICATION PAR TÉLÉPHONE -->
        <div id="auth-screen">
            <div class="snap-logo">👻</div>
            <h2 style="margin-bottom: 5px;">Snapchat 2</h2>
            <p style="font-size:12px; color:#aaa; margin-bottom:15px; text-align:center;">Vérification sécurisée par SMS</p>
            
            <input type="text" id="username-input" class="auth-input" placeholder="Créer un pseudo">
            <input type="tel" id="phone-input" class="auth-input" placeholder="+33 6 12 34 56 78">
            <button id="send-sms-btn" class="auth-btn">Recevoir le code</button>
            
            <div id="otp-box" style="display:none; width:100%; gap:15px; flex-direction:column;">
                <input type="text" id="code-input" class="auth-input" placeholder="Code de validation à 6 chiffres">
                <button id="verify-sms-btn" class="auth-btn" style="background:#22c55e; color:white;">Valider & Entrer</button>
            </div>
            
            <!-- Zone requise pour la validation de sécurité invisible Firebase -->
            <div id="recaptcha-container"></div>
        </div>

        <!-- OVERLAY DE FLUX D'APPEL DIRECT -->
        <div id="call-screen" class="call-overlay">
            <h3 id="call-status">Appel Vidéo...</h3>
            <div class="video-grid">
                <video id="remote-video" autoplay playsinline></video>
                <video id="local-video" autoplay playsinline muted></video>
            </div>
            <div style="display: flex; justify-content: center; gap: 10px;">
                <button id="hangup-btn" class="call-actions-btn btn-hangup">Raccrocher</button>
            </div>
        </div>

        <!-- 1. ÉCRAN CHAT -->
        <div id="screen-chat" class="app-screen">
            <div class="header">
                <span>Discussions</span>
                <span id="my-profile-tag" style="font-size: 13px; color: var(--snap-yellow);"></span>
            </div>
            <div class="list-container" id="users-container"></div>

            <!-- DISCUSSION OUVERTE -->
            <div id="active-chat-box" class="active-chat-box">
                <div class="header">
                    <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:18px; cursor:pointer;">⬅️</button>
                    <span id="chat-target-name">Chargement...</span>
                    <button id="start-call-btn" class="call-actions-btn btn-call" style="padding: 5px 12px; font-size:12px;">📞 Vidéo</button>
                </div>
                <div class="messages-container" id="messages-box"></div>
                <div class="chat-input-area">
                    <input type="text" id="msg-input" class="auth-input" style="padding:10px;" placeholder="Envoyer un SnapChat...">
                    <button id="send-msg-btn" class="auth-btn" style="width:auto; padding:10px 20px;">Envoyer</button>
                </div>
            </div>
        </div>

        <!-- 2. ÉCRAN CAMÉRA -->
        <div id="screen-camera" class="app-screen active">
            <video id="camera-preview" autoplay playsinline muted></video>
            <div class="camera-controls">
                <button class="snap-btn" id="capture-photo" title="Prendre un Snap"></button>
                <button class="spotlight-btn" id="post-spotlight-btn">🚀 Envoyer au Spotlight</button>
            </div>
        </div>

        <!-- 3. ÉCRAN SPOTLIGHT -->
        <div id="screen-spotlight" class="app-screen">
            <div class="header"><span>Spotlight 2.0</span></div>
            <div class="spotlight-feed" id="spotlight-container">
                <!-- Les snaps publics s'affichent ici -->
            </div>
        </div>

        <!-- BARRE DE NAVIGATION -->
        <nav class="bottom-nav">
            <button class="nav-btn" data-target="screen-chat">CHAT</button>
            <button class="nav-btn active" id="nav-cam" data-target="screen-camera">CAMÉRA</button>
            <button class="nav-btn" data-target="screen-spotlight">SPOTLIGHT</button>
        </nav>

    </div>

    <!-- SDK FIREBASE v10 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Ta configuration Firebase transmise
        const firebaseConfig = {
            apiKey: "AIzaSyCgiaYjJdON74dq-7kdRGtuQQdWfW8mTJI",
            authDomain: "formulaire-pizza-djoudi.firebaseapp.com",
            projectId: "formulaire-pizza-djoudi",
            storageBucket: "formulaire-pizza-djoudi.firebasestorage.app",
            messagingSenderId: "326014520778",
            appId: "1:326014520778:web:7029ae1bd53b81a76dd333",
            measurementId: "G-YBTJM6BG1Q"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let confirmationResult = null;
        let myUid = "";
        let myUsername = "";
        let activeChatUid = "";
        let localStream = null;
        let peerConnection = null;
        let lastCapturedPhoto = null;

        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        // --- AUTHENTIFICATION PAR SMS SÉCURISÉE ---
        window.onload = () => {
            window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            initCamera();
        };

        document.getElementById('send-sms-btn').addEventListener('click', async () => {
            const phoneNumber = document.getElementById('phone-input').value.trim();
            const username = document.getElementById('username-input').value.trim();
            
            if(!username || !phoneNumber) return alert("Remplis ton pseudo et ton numéro !");
            myUsername = username;

            signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier)
                .then((result) => {
                    confirmationResult = result;
                    document.getElementById('otp-box').style.display = 'flex';
                    document.getElementById('send-sms-btn').style.display = 'none';
                    alert("SMS envoyé ! Vérifie ton téléphone.");
                }).catch((error) => {
                    alert("Erreur d'envoi SMS: " + error.message);
                });
        });

        document.getElementById('verify-sms-btn').addEventListener('click', () => {
            const code = document.getElementById('code-input').value.trim();
            confirmationResult.confirm(code).then(async (result) => {
                const user = result.user;
                myUid = user.uid;

                document.getElementById('my-profile-tag').innerText = `@${myUsername}`;
                
                // Sauvegarde du profil lié à l'UID et au numéro validé
                await setDoc(doc(db, "users", myUid), {
                    uid: myUid,
                    username: myUsername,
                    phone: user.phoneNumber,
                    online: true
                });

                document.getElementById('auth-screen').style.display = 'none';
                listenToUsers();
                listenToCalls();
                listenToSpotlight();
            }).catch(() => alert("Code SMS invalide !"));
        });

        // --- CAPTURE & REPLAY (Simulation de Canvas pour Photo) ---
        async function initCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('camera-preview').srcObject = localStream;
                document.getElementById('local-video').srcObject = localStream;
            } catch (e) { console.error("Caméra indisponible", e); }
        }

        document.getElementById('capture-photo').addEventListener('click', () => {
            // Création d'un snapshot à partir du flux vidéo direct
            const video = document.getElementById('camera-preview');
            const canvas = document.createElement('canvas');
            canvas.width = 420; canvas.height = 700;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0); ctx.scale(-1, 1); // miroir
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            lastCapturedPhoto = canvas.toDataURL('image/jpeg');
            alert("Photo capturée ! Prête à être partagée sur Spotlight.");
        });

        // --- ENVOI AU SPOTLIGHT FIRESTORE ---
        document.getElementById('post-spotlight-btn').addEventListener('click', async () => {
            if(!lastCapturedPhoto) return alert("Prends d'abord une photo avec le bouton rond !");
            
            await addDoc(collection(db, "spotlight"), {
                photoData: lastCapturedPhoto,
                authorId: myUid,
                authorName: myUsername,
                timestamp: Date.now()
            });
            alert("Snap partagé sur le flux Spotlight !");
            lastCapturedPhoto = null;
        });

        // Lecture du flux Spotlight en continu
        function listenToSpotlight() {
            const q = query(collection(db, "spotlight"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('spotlight-container');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const post = doc.data();
                    const div = document.createElement('div');
                    div.className = "spotlight-post";
                    div.innerHTML = `
                        <img class="spotlight-img" src="${post.photoData}">
                        <div class="spotlight-info">
                            <h4>@${post.authorName}</h4>
                            <p style="font-size:11px; color:#ddd;">Posté en direct</p>
                        </div>
                    `;
                    container.appendChild(div);
                });
            });
        }

        // --- MESSAGERIE PRIVÉE EN TEMPS RÉEL ---
        function listenToUsers() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                const container = document.getElementById('users-container');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const user = doc.data();
                    if(user.uid !== myUid) {
                        const div = document.createElement('div');
                        div.className = "user-item";
                        div.innerHTML = `<span>👤 ${user.username}</span><span style="font-size:12px; color:#22c55e;">● En ligne</span>`;
                        div.onclick = () => openChat(user.uid, user.username);
                        container.appendChild(div);
                    }
                });
            });
        }

        let unsubscribeMessages = null;
        function openChat(targetUid, targetName) {
            activeChatUid = targetUid;
            document.getElementById('chat-target-name').innerText = targetName;
            document.getElementById('active-chat-box').style.display = 'flex';
            
            if(unsubscribeMessages) unsubscribeMessages();
            const chatId = [myUid, activeChatUid].sort().join("_");

            const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const box = document.getElementById('messages-box');
                box.innerHTML = "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `msg ${data.sender === myUid ? 'sent' : 'received'}`;
                    msgDiv.innerText = data.text;
                    box.appendChild(msgDiv);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.closeChat = () => document.getElementById('active-chat-box').style.display = 'none';

        document.getElementById('send-msg-btn').addEventListener('click', async () => {
            const text = document.getElementById('msg-input').value.trim();
            if(!text) return;
            const chatId = [myUid, activeChatUid].sort().join("_");
            
            await addDoc(collection(db, "chats", chatId, "messages"), {
                text: text,
                sender: myUid,
                timestamp: Date.now()
            });
            document.getElementById('msg-input').value = "";
        });

        // --- APPEL DIRECT VIDÉO DE SMARTPHONE À SMARTPHONE (WebRTC) ---
        document.getElementById('start-call-btn').addEventListener('click', async () => {
            const callId = [myUid, activeChatUid].sort().join("_");
            document.getElementById('call-screen').style.display = 'flex';

            peerConnection = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = ev => document.getElementById('remote-video').srcObject = ev.streams[0];

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            await setDoc(doc(db, "calls", callId), {
                offer: { type: offer.type, sdp: offer.sdp },
                caller: myUid,
                receiver: activeChatUid,
                status: "ringing"
            });

            onSnapshot(doc(db, "calls", callId), async (snap) => {
                const data = snap.data();
                if (data?.answer && !peerConnection.currentRemoteDescription) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                    document.getElementById('call-status').innerText = "En direct";
                }
                if (data?.status === "ended") endCallVisuals();
            });
        });

        function listenToCalls() {
            onSnapshot(collection(db, "calls"), (snapshot) => {
                snapshot.forEach(async (change) => {
                    const data = change.data();
                    if(data.receiver === myUid && data.status === "ringing") {
                        const accept = confirm("📞 Appel vidéo de Snapchat 2 ! Répondre ?");
                        const callId = change.id;
                        
                        if(accept) {
                            document.getElementById('call-screen').style.display = 'flex';
                            peerConnection = new RTCPeerConnection(rtcConfig);
                            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                            peerConnection.ontrack = ev => document.getElementById('remote-video').srcObject = ev.streams[0];
                            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                            
                            const answer = await peerConnection.createAnswer();
                            await peerConnection.setLocalDescription(answer);

                            await updateDoc(doc(db, "calls", callId), {
                                answer: { type: answer.type, sdp: answer.sdp },
                                status: "connected"
                            });
                        } else {
                            await updateDoc(doc(db, "calls", callId), { status: "ended" });
                        }
                    }
                });
            });
        }

        document.getElementById('hangup-btn').addEventListener('click', async () => {
            const callId = [myUid, activeChatUid].sort().join("_");
            await setDoc(doc(db, "calls", callId), { status: "ended" }, { merge: true });
            endCallVisuals();
        });

        function endCallVisuals() {
            document.getElementById('call-screen').style.display = 'none';
            if(peerConnection) { peerConnection.close(); peerConnection = null; }
            document.getElementById('call-status').innerText = "Appel Vidéo...";
        }

        // --- CHANGER D'ONGLET ---
        const navButtons = document.querySelectorAll('.nav-btn');
        const screens = document.querySelectorAll('.app-screen');
        navButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                navButtons.forEach(b => b.classList.remove('active'));
                screens.forEach(s => s.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.getAttribute('data-target')).classList.add('active');
            });
        });
    </script>
</body>
</html>
